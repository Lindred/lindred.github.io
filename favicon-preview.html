<!DOCTYPE html>
<html>
<head>
<title>Favicon Options</title>
<style>
    body { background: #050404; color: #d9cfc2; font-family: Georgia, serif; padding: 40px; }
    h1 { font-style: italic; font-weight: 200; margin-bottom: 40px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 32px; }
    .option { text-align: center; padding: 24px; border: 1px solid #2a2520; border-radius: 4px; }
    .option svg { display: block; margin: 0 auto 8px; background: #050404; border: 1px solid #2a2520; }
    .small { width: 32px; height: 32px; }
    .large { width: 100px; height: 100px; margin-top: 16px !important; }
    .label { font-style: italic; font-size: 14px; color: #c8a96e; margin-top: 16px; }
    .desc { font-size: 12px; color: #5a5048; margin-top: 4px; font-style: italic; }
</style>
</head>
<body>
<h1>Favicon Options</h1>
<div class="grid">

    <div class="option">
        <svg class="small" viewBox="0 0 32 32"><rect width="32" height="32" fill="#050404"/><g stroke="#c8a96e" stroke-width="2" stroke-linecap="round" fill="none"><line x1="16" y1="6" x2="16" y2="26"/><line x1="10" y1="11" x2="22" y2="11"/></g></svg>
        <svg class="large" viewBox="0 0 32 32"><rect width="32" height="32" fill="#050404"/><g stroke="#c8a96e" stroke-width="2" stroke-linecap="round" fill="none"><line x1="16" y1="6" x2="16" y2="26"/><line x1="10" y1="11" x2="22" y2="11"/></g></svg>
        <div class="label">Option 1</div>
        <div class="desc">Simple cross (current)</div>
    </div>

    <div class="option">
        <svg class="small" viewBox="0 0 32 32"><rect width="32" height="32" fill="#050404"/><g stroke="#c8a96e" stroke-width="1.4" stroke-linecap="round" fill="none"><line x1="16" y1="3" x2="16" y2="29"/><line x1="3" y1="16" x2="29" y2="16"/><line x1="7" y1="7" x2="25" y2="25"/><line x1="25" y1="7" x2="7" y2="25"/></g></svg>
        <svg class="large" viewBox="0 0 32 32"><rect width="32" height="32" fill="#050404"/><g stroke="#c8a96e" stroke-width="1.4" stroke-linecap="round" fill="none"><line x1="16" y1="3" x2="16" y2="29"/><line x1="3" y1="16" x2="29" y2="16"/><line x1="7" y1="7" x2="25" y2="25"/><line x1="25" y1="7" x2="7" y2="25"/></g></svg>
        <div class="label">Option 2</div>
        <div class="desc">8-pointed star (from your sigil)</div>
    </div>

    <div class="option">
        <svg class="small" viewBox="0 0 32 32"><rect width="32" height="32" fill="#050404"/><path d="M16 6 C16 6 10 13 10 19 C10 23 13 26 16 26 C19 26 22 23 22 19 C22 13 16 6 16 6Z" stroke="#c8a96e" stroke-width="1.5" fill="none"/></svg>
        <svg class="large" viewBox="0 0 32 32"><rect width="32" height="32" fill="#050404"/><path d="M16 6 C16 6 10 13 10 19 C10 23 13 26 16 26 C19 26 22 23 22 19 C22 13 16 6 16 6Z" stroke="#c8a96e" stroke-width="1.5" fill="none"/></svg>
        <div class="label">Option 3</div>
        <div class="desc">Teardrop (from your sigil)</div>
    </div>

    <div class="option">
        <svg class="small" viewBox="0 0 32 32"><rect width="32" height="32" fill="#050404"/><g stroke="#c8a96e" stroke-width="1.5" stroke-linecap="round" fill="none"><line x1="16" y1="4" x2="16" y2="22"/><line x1="11" y1="9" x2="21" y2="9"/><circle cx="16" cy="24" r="1.2"/><path d="M16 26 C16 26 13 28 13 29 C13 30 16 31 16 31 C16 31 19 30 19 29 C19 28 16 26 16 26Z"/></g></svg>
        <svg class="large" viewBox="0 0 32 32"><rect width="32" height="32" fill="#050404"/><g stroke="#c8a96e" stroke-width="1.5" stroke-linecap="round" fill="none"><line x1="16" y1="4" x2="16" y2="22"/><line x1="11" y1="9" x2="21" y2="9"/><circle cx="16" cy="24" r="1.2"/><path d="M16 26 C16 26 13 28 13 29 C13 30 16 31 16 31 C16 31 19 30 19 29 C19 28 16 26 16 26Z"/></g></svg>
        <div class="label">Option 4</div>
        <div class="desc">Mini sigil (cross + teardrop)</div>
    </div>

    <div class="option">
        <svg class="small" viewBox="0 0 32 32"><rect width="32" height="32" fill="#050404"/><text x="16" y="24" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-style="italic" font-weight="300" fill="#c8a96e">L</text></svg>
        <svg class="large" viewBox="0 0 32 32"><rect width="32" height="32" fill="#050404"/><text x="16" y="24" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-style="italic" font-weight="300" fill="#c8a96e">L</text></svg>
        <div class="label">Option 5</div>
        <div class="desc">Italic L letter</div>
    </div>

    <div class="option">
        <svg class="small" viewBox="0 0 32 32"><rect width="32" height="32" fill="#6b1212"/><g stroke="#d9cfc2" stroke-width="2" stroke-linecap="round" fill="none"><line x1="16" y1="6" x2="16" y2="26"/><line x1="10" y1="11" x2="22" y2="11"/></g></svg>
        <svg class="large" viewBox="0 0 32 32"><rect width="32" height="32" fill="#6b1212"/><g stroke="#d9cfc2" stroke-width="2" stroke-linecap="round" fill="none"><line x1="16" y1="6" x2="16" y2="26"/><line x1="10" y1="11" x2="22" y2="11"/></g></svg>
        <div class="label">Option 6</div>
        <div class="desc">Cross on blood red bg</div>
    </div>

    <div class="option">
        <svg class="small" viewBox="0 0 32 32"><rect width="32" height="32" fill="#050404"/><g stroke="#c8a96e" stroke-width="1.2" stroke-linecap="round" fill="none"><line x1="16" y1="4" x2="16" y2="28"/><line x1="9" y1="10" x2="23" y2="10"/><circle cx="16" cy="16" r="6"/></g></svg>
        <svg class="large" viewBox="0 0 32 32"><rect width="32" height="32" fill="#050404"/><g stroke="#c8a96e" stroke-width="1.2" stroke-linecap="round" fill="none"><line x1="16" y1="4" x2="16" y2="28"/><line x1="9" y1="10" x2="23" y2="10"/><circle cx="16" cy="16" r="6"/></g></svg>
        <div class="label">Option 7</div>
        <div class="desc">Cross with halo/orb</div>
    </div>

</div>
</body>
</html>
